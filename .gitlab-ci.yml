stages:
  - build
  - deploy

variables:
  APP_DIR: /home/gitlab-runner/frontend/samatva-crm

build:
  stage: build
  script:
    - cp $APP_DIR/.env.production .env.production
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - .next/
      - node_modules/
      - package.json
      - pnpm-lock.yaml
      - public/
    expire_in: 30 min
  only:
    - main
  tags:
    - samatva

deploy:production:
  stage: deploy
  script:
    - mkdir -p $APP_DIR
    - cp -r .next node_modules package.json pnpm-lock.yaml public $APP_DIR/
    - cd $APP_DIR
    - pm2 reload samatva-crm || pm2 start pnpm --name samatva-crm -- start
    - pm2 save
  only:
    - main
  tags:
    - samatva
  needs:
    - build
