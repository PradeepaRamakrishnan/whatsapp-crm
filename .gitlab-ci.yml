stages:
  - deploy

# -----------------------
# FIREBASE DEPLOY (PROD)
# Auto-deploys on push to main
# Requires: FIREBASE_TOKEN CI variable
# -----------------------
deploy:production:
  stage: deploy
  image: node:20-alpine
  script:
    - npm install -g firebase-tools pnpm
    - pnpm install --frozen-lockfile
    - pnpm run build
    - firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project campaign-management-crm --non-interactive
  only:
    - main

# -----------------------
# FIREBASE DEPLOY (STAGING)
# Auto-deploys on push to staging branch
# Requires: FIREBASE_TOKEN CI variable
# -----------------------
deploy:staging:
  stage: deploy
  image: node:20-alpine
  script:
    - npm install -g firebase-tools pnpm
    - pnpm install --frozen-lockfile
    - pnpm run build
    - firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project campaign-management-crm --non-interactive
  only:
    - staging
